name: CI — Test & Lint

on:
  push:
    branches: [develop, "feat/**", "fix/**", "refactor/**", "chore/**"]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: 🔐 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true          # Cache ~/.cache/uv between runs
          cache-dependency-glob: "backend/uv.lock"

      - name: Sync lint dependencies
        working-directory: backend
        run: uv sync --frozen --only-group lint

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check src/ tests/

  # ─── Backend Tests ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Backend Tests
    needs: [security]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Sync test dependencies
        working-directory: backend
        # Install core + test group only — NO ML/NLP heavy deps in CI
        # ml_service uses graceful degradation → tests pass without onnxruntime
        run: uv sync --frozen --group test

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          APP_ENV: "test"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uv run pytest tests/unit/ tests/integration/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            -q --no-header

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          fail_ci_if_error: false

  # ─── Lock File Integrity ────────────────────────────────────────────────────
  lock-check:
    name: 🔒 Lock File Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Verify uv.lock is up-to-date
        working-directory: backend
        # Fails if pyproject.toml was changed without running 'uv lock'
        run: uv lock --check

  # ─── CI Gate ────────────────────────────────────────────────────────────────
  # Branch Protection chi can check job nay.
  # Neu tat ca jobs xanh → ci-pass xanh → PR duoc merge.
  ci-pass:
    name: ✅ CI Pass
    needs: [test, lint, lock-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}"       != "success" || \
                "${{ needs.lint.result }}"       != "success" || \
                "${{ needs.lock-check.result }}" != "success" ]]; then
            echo "❌ CI failed — PR cannot be merged"
            echo "  test:       ${{ needs.test.result }}"
            echo "  lint:       ${{ needs.lint.result }}"
            echo "  lock-check: ${{ needs.lock-check.result }}"
            exit 1
          fi
          echo "✅ All checks passed — PR is ready to merge"
