name: CI — Test & Lint

on:
  push:
    branches: [develop, "feat/**", "fix/**", "refactor/**", "chore/**"]
  pull_request:
    branches: [main, develop]

# Không chạy CI khi push thẳng lên main.
# main chỉ nhận code qua PR đã được CI approve.

jobs:
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: 🧪 Backend Tests
    needs: [security]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install aiosqlite

      - name: Run tests with coverage
        working-directory: backend
        env:
          # DATABASE_URL không cần thiết với lazy engine + override_engine()
          # nhưng giữ lại để đảm bảo settings.py không throw validation error
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          APP_ENV: "test"
          REDIS_URL: "redis://localhost:6379"
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml

  lint:
    name: 🔍 Lint & Type Check
    needs: [security]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check src/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check src/

  # Job tổng hợp — Branch Protection chỉ cần check job này.
  # Nếu tất cả jobs trên xanh → ci-pass xanh → PR được merge.
  ci-pass:
    name: ✅ CI Pass
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ CI failed — PR cannot be merged"
            exit 1
          fi
          echo "✅ All checks passed — PR is ready to merge"
